name: Daily Economy News

on:
  schedule:
    - cron: '00 23 * * *' # 세계 표준시 기준 (한국 시간 오전 8시 00분)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install feedparser python-telegram-bot
      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python - <<EOF
          import os, feedparser, asyncio
          from telegram import Bot

          async def main():
              # 한국경제 경제 뉴스 RSS로 변경 (항상 최신순)
              rss_url = "https://rss.hankyung.com/feeds/economy.xml"
              feed = feedparser.parse(rss_url)
              
              if not feed.entries:
                  msg = "오늘 새로운 경제 뉴스가 아직 업데이트되지 않았네요! 🧐"
              else:
                  news_items = []
                  # 상위 5개만 가져오되 최신순으로 정렬
                  for e in feed.entries[:5]:
                      news_items.append(f"📌 {e.title}\n🔗 {e.link}")
                  msg = "📢 [경제 Vibe 체크 - 최신 경제 뉴스]\n\n" + "\n\n".join(news_items)
                  msg += "\n\n💪 오늘도 화이팅하세요!"
                  
              await Bot(token=os.environ['TELEGRAM_TOKEN']).send_message(chat_id=os.environ['CHAT_ID'], text=msg)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
