name: Daily Economy News

on:
  schedule:
    - cron: '00 23 * * *' # 한국 시간 오전 8시 00분
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install feedparser python-telegram-bot
      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python - <<EOF
          import os, feedparser, asyncio
          from telegram import Bot

          async def main():
              # 관심 있는 경제지 RSS 리스트
              rss_urls = [
                  "https://rss.hankyung.com/feeds/economy.xml",  # 한국경제
                  "https://www.mk.co.kr/rss/30100041/",           # 매일경제
                  "https://news.google.com/rss/search?q=economy+site:economy.chosun.com+OR+site:economist.co.kr&hl=ko&gl=KR&ceid=KR:ko" # 주요 경제 주간지/이코노미
              ]
              
              keywords = ["금리", "유가"]
              news_items = []

              for url in rss_urls:
                  feed = feedparser.parse(url)
                  for e in feed.entries[:15]: # 각 매체당 최신 15개를 훑어봅니다.
                      title = e.get('title', '')
                      # 제목에 '금리' 또는 '유가'가 포함되어 있는지 확인
                      if any(kw in title for kw in keywords):
                          link = e.get('link', '#')
                          # 중복 기사 방지
                          item = f"📌 {title}\n🔗 {link}"
                          if item not in news_items:
                              news_items.append(item)
              
              if not news_items:
                  msg = "📢 [경제 키워드 체크]\n\n오늘은 '금리'나 '유가'와 관련된 새로운 소식이 없네요. 평온한 하루입니다! 😊"
              else:
                  # 최대 7개까지만 요약해서 보냅니다.
                  msg = "📢 [금리 & 유가 맞춤 브리핑]\n\n" + "\n\n".join(news_items[:7])
                  msg += "\n\n💪 설정하신 키워드 위주로 정리해 드렸습니다!"
                  
              await Bot(token=os.environ['TELEGRAM_TOKEN']).send_message(chat_id=os.environ['CHAT_ID'], text=msg, disable_web_page_preview=True)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

